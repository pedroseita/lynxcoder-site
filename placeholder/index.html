<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LynxCoder — Em breve</title>
<meta name="description" content="LynxCoder — Desenvolvimento de software. Site em construção.">
<meta name="theme-color" content="#08090b">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #08090b;
    color: #eef0f3;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    -webkit-font-smoothing: antialiased;
  }

  .wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    padding: 40px 24px;
    text-align: center;
  }

  .logo {
    width: 96px;
    height: 96px;
    border-radius: 20px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .brand {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: #eef0f3;
  }

  .eyebrow {
    font-family: 'JetBrains Mono', 'Courier New', monospace;
    font-size: 12px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #3df0ff;
  }

  h1 {
    font-size: clamp(32px, 6vw, 56px);
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1.05;
  }

  h1 span { color: #3df0ff; }

  .lead {
    font-size: 17px;
    color: #9aa1ad;
    max-width: 420px;
    line-height: 1.6;
  }

  .dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #3df0ff;
    animation: pulse 2s infinite;
    vertical-align: middle;
    margin-right: 8px;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .status {
    display: flex;
    align-items: center;
    font-size: 13px;
    color: #5b626d;
    font-family: 'JetBrains Mono', monospace;
  }

  .divider {
    width: 1px;
    height: 48px;
    background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.08), transparent);
  }

  footer {
    position: fixed;
    bottom: 24px;
    font-size: 12px;
    color: #5b626d;
    font-family: 'JetBrains Mono', monospace;
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="logo">
      <img src="logo.png" alt="LynxCoder logo">
    </div>

    <div class="brand">LynxCoder</div>

    <div class="divider"></div>

    <p class="eyebrow">// desenvolvimento de software</p>

    <h1>Em <span>breve</span>.</h1>

    <p class="lead">
      Estamos a construir algo com cuidado.<br>
      Volta em breve ou entra em contacto.
    </p>

    <p class="status">
      <span class="dot"></span>
      a construir — lynxcoder.com.br
    </p>

    <a href="mailto:devlynxcoder@gmail.com"
       style="margin-top:8px; color:#3df0ff; font-size:14px; text-decoration:none; font-family:monospace; opacity:0.7">
      devlynxcoder@gmail.com
    </a>
  </div>

  <footer>© 2026 LynxCoder — Pedro Seita</footer>
</body>
</html>
